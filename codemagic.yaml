workflows:
  greenmanager-build:
    name: GreenManager Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      vars:
        NODE_VERSION: "18"
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Clean install dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps
      - name: Build web assets
        script: |
          npm run build
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: Build iOS (unsigned)
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ios/build/Build/Products/Release-iphoneos/*.app
      - ios/build/Build/Products/Release-iphoneos/*.ipa
    publishing:
      email:
        recipients:
          - seu-email@gmail.com
        notify:
          success: true
          failure: true
