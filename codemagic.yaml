workflows:
  ios-build-green-manager:
    name: Build Green Manager for iOS
    instance_type: mac_mini_m2
    environment:
      node: 20.11.0
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - ~/.npm
        - node_modules
    scripts:
      - name: Clean Install com Correções
        script: |
          # Limpeza completa
          echo "🧹 Limpando cache e módulos antigos..."
          rm -rf node_modules package-lock.json
          npm cache clean --force
          
          # Instalar npm atualizado
          echo "📦 Atualizando npm..."
          npm install -g npm@10.8.1
          
          # Criar lockfile primeiro
          echo "🔒 Criando package-lock.json..."
          npm install --package-lock-only --ignore-scripts
          
          # Instalar dependências
          echo "📦 Instalando dependências..."
          npm install
          
          # Instalar TypeScript localmente (não global)
          echo "🔧 Instalando TypeScript..."
          npm install --save-dev typescript@5.5.4
          
          # Instalar Capacitor
          echo "⚡ Instalando Capacitor..."
          npm install @capacitor/core@6.1.0 @capacitor/cli@6.1.0 @capacitor/ios@6.1.0 @capacitor/assets@3.0.5
          
          # Verificar instalação
          echo "✅ Verificando instalações..."
          npx tsc --version
          npx cap --version || true
          
          # Build
          echo "🏗️ Build da aplicação..."
          npm run build

      - name: Setup iOS Project
        script: |
          # Detectar pasta de build
          if [ -d "dist" ]; then
            WEB_DIR="dist"
          elif [ -d "build" ]; then
            WEB_DIR="build"
          elif [ -d "www" ]; then
            WEB_DIR="www"
          else
            WEB_DIR="dist"
            mkdir -p dist
          fi
          
          echo "📱 Usando web directory: $WEB_DIR"
          
          # Remover iOS antigo
          rm -rf ios
          
          # Inicializar Capacitor
          echo "⚙️ Inicializando projeto iOS..."
          npx cap init "Green Manager" "com.green.manager" --web-dir $WEB_DIR
          npx cap add ios
          npx cap sync ios
          
          # Gerar assets
          echo "🎨 Gerando assets..."
          npx capacitor-assets generate --ios || true

      - name: Build IPA Sem Assinatura
        script: |
          cd ios/App
          
          echo "📦 Instalando pods..."
          pod install --repo-update || pod install
          
          echo "🔨 Build do app..."
          xcodebuild clean build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGN_STYLE=Manual
          
          echo "📦 Criando IPA..."
          mkdir -p Payload
          APP_PATH=$(find ./build_output -name "*.app" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ ERRO: .app não encontrado!"
            exit 1
          fi
          
          cp -R "$APP_PATH" Payload/
          zip -r GreenManager.ipa Payload
          mv GreenManager.ipa ../../

    artifacts:
      - "*.ipa"
