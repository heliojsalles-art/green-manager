workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      node: 18
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/App.xcworkspace"
        XCODE_SCHEME: "App"
    cache:
      cache_paths:
        - ~/.npm
        - ~/Library/Caches/CocoaPods
    scripts:
      - name: Criar estrutura de pastas
        script: | 
          mkdir -p src/components/common
          mkdir -p src/services
          mkdir -p src/pages
      
      - name: Verificar/Criar componente Menu
        script: | 
          if [ ! -f src/components/common/Menu.tsx ]; then
            echo "📝 Criando componente Menu.tsx..."
            cat > src/components/common/Menu.tsx << 'EOF'
          import React from 'react';
          import { Link } from 'react-router-dom';

          const Menu: React.FC = () => {
            return (
              <nav style={{ 
                padding: '15px', 
                backgroundColor: '#2c3e50',
                color: 'white'
              }}>
                <ul style={{ 
                  display: 'flex', 
                  gap: '20px', 
                  listStyle: 'none',
                  margin: 0,
                  padding: 0
                }}>
                  <li><Link to="/" style={{ color: 'white', textDecoration: 'none' }}>Home</Link></li>
                  <li><Link to="/dashboard" style={{ color: 'white', textDecoration: 'none' }}>Dashboard</Link></li>
                  <li><Link to="/profile" style={{ color: 'white', textDecoration: 'none' }}>Perfil</Link></li>
                  <li><Link to="/settings" style={{ color: 'white', textDecoration: 'none' }}>Configurações</Link></li>
                </ul>
              </nav>
            );
          };

          export default Menu;
          EOF
          fi
      
      - name: Verificar/Criar serviço database
        script: | 
          if [ ! -f src/services/database.ts ]; then
            echo "📝 Criando database.ts..."
            cat > src/services/database.ts << 'EOF'
          export interface Database {
            connect: () => Promise<void>;
            query: (sql: string, params?: any[]) => Promise<any[]>;
            close: () => Promise<void>;
          }

          export interface User {
            id: string;
            name: string;
            email: string;
          }

          class DatabaseImpl implements Database {
            private connected: boolean = false;

            async connect(): Promise<void> {
              this.connected = true;
              console.log('✅ Banco de dados conectado');
            }

            async query(sql: string, params?: any[]): Promise<any[]> {
              if (!this.connected) {
                await this.connect();
              }
              console.log('📊 Query executada:', sql);
              return [];
            }

            async close(): Promise<void> {
              this.connected = false;
              console.log('🔒 Banco de dados fechado');
            }
          }

          export const getDatabase = (): Database => {
            return new DatabaseImpl();
          };

          export default getDatabase;
          EOF
          fi
      
      - name: Criar páginas padrão
        script: | 
          # Home page
          if [ ! -f src/pages/Home.tsx ]; then
            cat > src/pages/Home.tsx << 'EOF'
          import React from 'react';
          import { getDatabase } from '../services/database';

          const Home: React.FC = () => {
            const db = getDatabase();

            React.useEffect(() => {
              db.connect();
              return () => { db.close(); };
            }, []);

            return (
              <div style={{ padding: '20px' }}>
                <h1>Página Inicial</h1>
                <p>Bem-vindo ao Green Manager!</p>
              </div>
            );
          };

          export default Home;
          EOF
          fi

          # Dashboard page
          if [ ! -f src/pages/Dashboard.tsx ]; then
            cat > src/pages/Dashboard.tsx << 'EOF'
          import React from 'react';

          const Dashboard: React.FC = () => {
            return (
              <div style={{ padding: '20px' }}>
                <h1>Dashboard</h1>
                <p>Seu painel de controle</p>
              </div>
            );
          };

          export default Dashboard;
          EOF
          fi

          # Profile page
          if [ ! -f src/pages/Profile.tsx ]; then
            cat > src/pages/Profile.tsx << 'EOF'
          import React from 'react';

          const Profile: React.FC = () => {
            return (
              <div style={{ padding: '20px' }}>
                <h1>Perfil</h1>
                <p>Página de perfil do usuário</p>
              </div>
            );
          };

          export default Profile;
          EOF
          fi

          # Settings page
          if [ ! -f src/pages/Settings.tsx ]; then
            cat > src/pages/Settings.tsx << 'EOF'
          import React from 'react';

          const Settings: React.FC = () => {
            return (
              <div style={{ padding: '20px' }}>
                <h1>Configurações</h1>
                <p>Página de configurações</p>
              </div>
            );
          };

          export default Settings;
          EOF
          fi
      
      - name: Corrigir App.tsx
        script: | 
          if [ -f src/App.tsx ]; then
            echo "🔧 Corrigindo App.tsx..."
            cp src/App.tsx src/App.tsx.bak
            sed -i 's/ exact={true}//g' src/App.tsx
            sed -i 's/ exact//g' src/App.tsx
            echo "✅ App.tsx corrigido"
          fi
      
      - name: Instalar dependências
        script: | 
          echo "📦 Instalando dependências..."
          npm install
          npm install --save-dev @types/react @types/react-dom
          npm install react-router-dom@latest
          npm install @capacitor/core @capacitor/ios
          npm install @capacitor/preferences
      
      - name: Build do projeto web
        script: | 
          echo "🏗️ Executando build web..."
          export NODE_OPTIONS="--max-old-space-size=4096"
          npm run build
      
      - name: Sincronizar Capacitor iOS
        script: | 
          if [ -f "capacitor.config.json" ] || [ -f "capacitor.config.ts" ]; then
            echo "⚡ Sincronizando Capacitor para iOS..."
            npx cap sync ios
          fi
      
      - name: Instalar CocoaPods
        script: | 
          if [ -d "ios/App" ]; then
            echo "📱 Instalando CocoaPods..."
            cd ios/App
            pod install
          fi
      
      - name: Build iOS
        script: | 
          echo "📱 Buildando iOS..."
          cd ios
          xcodebuild -workspace "App.xcworkspace" \
            -scheme "App" \
            -sdk iphoneos \
            -configuration Release \
            archive -archivePath ../build/ios.xcarchive \
            CODE_SIGNING_ALLOWED=NO
      
      - name: Export IPA
        script: | 
          echo "📦 Exportando IPA..."
          xcodebuild -exportArchive \
            -archivePath ../build/ios.xcarchive \
            -exportOptionsPlist ../exportOptions.plist \
            -exportPath ../build/ios \
            CODE_SIGNING_ALLOWED=NO
    
    artifacts:
      - build/ios/*.ipa
      - build/**/*.ipa
    
    publishing:
      email:
        recipients:
          - seu-email@example.com
